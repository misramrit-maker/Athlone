<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
<title>Athlone CC · Scorer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#ffffff;--surface:#f6f8fa;--surface2:#eaeef2;--border:#d0d7de;
  --accent:#2ea043;--al:#1a7f37;--ag:rgba(46,160,67,.10);
  --danger:#f85149;--dg:rgba(248,81,73,.10);
  --warn:#9a6700;--purple:#8250df;
  --text:#1f2328;--ts:#57606a;--tm:#8c959f;
  --r:6px;--hh:52px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;display:flex;flex-direction:column}
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-thumb{background:#c8d0da;border-radius:2px}

/* Header */
#topbar{height:var(--hh);background:#ffffff;border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 12px;gap:10px;flex-shrink:0;z-index:50}
.logo-img{width:38px;height:38px;border-radius:50%;flex-shrink:0;object-fit:cover;box-shadow:0 0 0 2px rgba(46,160,67,.4),0 2px 8px rgba(0,0,0,.5);}
.hdr-info{flex:1;min-width:0}
.hdr-title{font-size:15px;font-weight:700;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hdr-sub{font-size:10px;color:var(--tm);font-family:'DM Mono',monospace;letter-spacing:.04em}
.hdr-btns{display:flex;align-items:center;gap:6px;flex-shrink:0}
.hbtn{background:none;border:1px solid var(--border);border-radius:5px;color:var(--ts);font-family:'DM Mono',monospace;font-size:10px;font-weight:700;letter-spacing:.06em;padding:4px 8px;cursor:pointer;transition:all .15s;white-space:nowrap}
.hbtn:hover{border-color:var(--al);color:var(--al)}
.hbtn.p{border-color:var(--accent);color:var(--al);background:var(--ag)}
.hbtn.p:hover{background:var(--accent);color:#fff}
.live-dot{width:7px;height:7px;border-radius:50%;background:var(--al);box-shadow:0 0 6px var(--al);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

/* Page */
#page{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
.wrap{padding:10px 12px 28px;max-width:500px;margin:0 auto}

/* Cards */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:12px;margin-bottom:8px}
.card-ttl{font-size:10px;font-weight:700;color:var(--tm);text-transform:uppercase;letter-spacing:.1em;font-family:'DM Mono',monospace;margin-bottom:10px}

/* Inputs */
.lbl{display:block;font-size:10px;font-weight:600;color:var(--ts);margin-bottom:4px;text-transform:uppercase;letter-spacing:.06em}
.inp{width:100%;background:#ffffff;border:1px solid var(--border);border-radius:5px;padding:8px 10px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:13px;outline:none;transition:border-color .15s,box-shadow .15s}
.inp:focus{border-color:var(--accent);box-shadow:0 0 0 2px var(--ag)}
.inp::placeholder{color:var(--tm)}
select.inp option{background:#ffffff}
.fld{margin-bottom:8px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px}

/* Toss */
.toss-g{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.toss-btn{padding:11px 6px;border-radius:5px;border:1.5px solid var(--border);background:transparent;color:var(--ts);font-family:'DM Mono',monospace;font-size:13px;font-weight:500;cursor:pointer;transition:all .15s;text-align:center}
.toss-btn.on{border-color:var(--al);background:var(--ag);color:var(--al)}

/* Roster */
.roster{background:#ffffff;border:1px solid var(--border);border-radius:5px;overflow:hidden}
.roster-hdr{padding:6px 10px;font-size:10px;font-weight:700;color:var(--ts);text-transform:uppercase;letter-spacing:.06em;background:var(--surface2);border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.roster-scroll{max-height:154px;overflow-y:auto}
.r-row{display:flex;align-items:center;gap:6px;padding:5px 10px;border-bottom:1px solid rgba(208,215,222,.6)}
.r-row:last-child{border-bottom:none}
.r-num{width:18px;font-size:10px;color:var(--tm);font-family:'DM Mono',monospace;text-align:right;flex-shrink:0}
.r-inp{flex:1;background:none;border:none;outline:none;color:var(--text);font-family:'DM Sans',sans-serif;font-size:13px;padding:1px 0}
.r-inp::placeholder{color:var(--tm)}
.r-row-12th{border-top:1px dashed var(--border);margin-top:2px;padding-top:2px;background:rgba(227,179,65,.04)}

/* Suggestions */
.pw{position:relative}
.suggs{position:absolute;top:calc(100% + 3px);left:0;right:0;background:#ffffff;border:1px solid var(--border);border-radius:5px;max-height:130px;overflow-y:auto;z-index:200;box-shadow:0 8px 20px rgba(0,0,0,.5);display:none}
.sugg{padding:7px 10px;cursor:pointer;font-size:13px;color:var(--text);transition:background .1s;border-bottom:1px solid rgba(208,215,222,.6)}
.sugg:last-child{border-bottom:none}
.sugg:hover{background:var(--ag);color:var(--al)}

/* Start button */
.sbtn{width:100%;padding:12px;border-radius:var(--r);border:none;background:var(--accent);color:#fff;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:700;cursor:pointer;letter-spacing:.03em;transition:all .15s;margin-bottom:12px;display:flex;align-items:center;justify-content:center;gap:6px;box-shadow:0 3px 12px rgba(46,160,67,.3)}
.sbtn:hover{background:var(--al);transform:translateY(-1px)}
.sbtn:active{transform:none}

/* Scoreboard */
.scoreboard{background:#ffffff;border:1px solid var(--border);border-radius:var(--r);padding:13px 14px;margin-bottom:8px;text-align:center;position:relative;overflow:hidden}
.scoreboard::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--accent),transparent)}
.sb-match{font-size:10px;color:var(--tm);font-family:'DM Mono',monospace;letter-spacing:.06em;text-transform:uppercase;margin-bottom:3px}
.sb-score{font-family:'DM Mono',monospace;font-size:50px;font-weight:500;color:var(--text);line-height:1;letter-spacing:-2px}
.sb-wkts{font-size:28px;color:var(--ts);letter-spacing:-1px}
.sb-meta{font-size:12px;color:var(--ts);margin-top:3px;font-family:'DM Mono',monospace}
.sb-tgt{font-size:12px;color:var(--warn);font-weight:600;margin-top:2px;font-family:'DM Mono',monospace}
.sb-toss{font-size:10px;color:var(--tm);margin-top:2px}

/* Batsmen */
.bat-row{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:6px}
.bat-card{background:#ffffff;border:1px solid var(--border);border-radius:var(--r);padding:8px 10px;cursor:pointer;transition:all .15s;text-align:center;position:relative}
.bat-card:hover{border-color:var(--accent);background:var(--ag)}
.bat-card.str{border-color:var(--al);background:var(--ag)}
.bat-lbl{font-size:8px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--tm);margin-bottom:2px;font-family:'DM Mono',monospace}
.bat-card.str .bat-lbl{color:var(--al)}
.bat-name{font-size:13px;font-weight:700;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bat-stats{font-size:11px;color:var(--ts);font-family:'DM Mono',monospace;margin-top:1px}
.str-ico{position:absolute;top:5px;right:7px;font-size:11px;color:var(--al)}

/* Bowler */
.bowl-strip{background:#ffffff;border:1px solid var(--border);border-radius:var(--r);padding:8px 12px;margin-bottom:6px;display:flex;align-items:center;justify-content:space-between;gap:8px}
.bowl-lbl{font-size:8px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--tm);font-family:'DM Mono',monospace}
.bowl-name{font-size:13px;font-weight:700;color:var(--text)}
.bowl-stats{font-size:11px;color:var(--ts);font-family:'DM Mono',monospace}
.dots{display:flex;gap:4px;align-items:center;flex-shrink:0}
.dot{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;font-family:'DM Mono',monospace;flex-shrink:0;border:1.5px solid var(--border);color:var(--ts);background:#ffffff}
.dot.mt{border-style:dashed;border-color:var(--tm);background:none;color:transparent}
.dot.W{background:var(--dg);border-color:var(--danger);color:var(--danger)}
.dot.six{background:rgba(163,113,247,.12);border-color:var(--purple);color:var(--purple)}
.dot.four{background:var(--ag);border-color:var(--al);color:var(--al)}
.dot.xtra{background:rgba(227,179,65,.1);border-color:var(--warn);color:var(--warn)}

/* Over done */
.over-done{background:rgba(46,160,67,.08);border:1.5px solid var(--accent);border-radius:var(--r);padding:12px;margin-bottom:6px;text-align:center}
.over-done-ttl{font-size:11px;font-weight:700;color:var(--al);text-transform:uppercase;letter-spacing:.08em;font-family:'DM Mono',monospace;margin-bottom:10px}

/* Run buttons */
.rg4{display:grid;grid-template-columns:repeat(4,1fr);gap:5px;margin-bottom:5px}
.rg3{display:grid;grid-template-columns:repeat(3,1fr);gap:5px;margin-bottom:5px}
.rbtn{padding:14px 0;border-radius:var(--r);border:1.5px solid var(--border);background:#ffffff;color:var(--text);font-family:'DM Mono',monospace;font-size:20px;font-weight:500;cursor:pointer;transition:all .1s;user-select:none}
.rbtn:hover{border-color:var(--accent);background:var(--ag)}
.rbtn:active{transform:scale(.94)}
.rbtn.four{border-color:var(--accent);color:var(--al);background:rgba(46,160,67,.08);font-size:22px}
.rbtn.six{border-color:var(--purple);color:var(--purple);background:rgba(163,113,247,.08);font-size:22px}
.rbtn.out{border-color:var(--danger);color:var(--danger);background:var(--dg);font-size:14px;font-weight:700;letter-spacing:.05em}

/* Extras */
.eg{display:grid;grid-template-columns:repeat(4,1fr);gap:4px;margin-bottom:5px}
.ebtn{padding:7px 0;border-radius:5px;border:1px solid var(--border);background:#ffffff;color:var(--ts);font-family:'DM Mono',monospace;font-size:11px;font-weight:600;cursor:pointer;transition:all .1s}
.ebtn.w,.ebtn.nb{border-color:rgba(227,179,65,.3);color:var(--warn);background:rgba(227,179,65,.06)}
.ebtn:hover{border-color:var(--accent);background:var(--ag);color:var(--al)}
.ebtn:active{transform:scale(.95)}
.undo{width:100%;padding:7px;border-radius:5px;border:1px solid var(--border);background:#ffffff;color:var(--ts);font-family:'DM Sans',sans-serif;font-size:12px;font-weight:600;cursor:pointer;transition:all .15s;margin-bottom:6px}
.undo:hover{color:var(--text);background:var(--surface2)}

/* Change card */
.chg-card{background:#ffffff;border:1px solid var(--border);border-radius:var(--r);padding:9px 12px;margin-bottom:6px}
.chg-ttl{font-size:10px;font-weight:700;color:var(--tm);text-transform:uppercase;letter-spacing:.1em;font-family:'DM Mono',monospace;margin-bottom:8px}
.chg-row{display:flex;gap:6px;align-items:flex-end;margin-bottom:6px}
.chg-row:last-child{margin-bottom:0}
.chg-row .fld{flex:1;margin-bottom:0}
.set-btn{height:36px;padding:0 11px;border-radius:5px;border:1px solid var(--accent);background:var(--ag);color:var(--al);font-family:'DM Sans',sans-serif;font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap;flex-shrink:0;transition:all .15s}
.set-btn:hover{background:var(--accent);color:#fff}

/* Extras bar */
.xbar{display:grid;grid-template-columns:repeat(4,1fr);gap:4px;margin-bottom:6px;text-align:center}
.xstat{background:#ffffff;border:1px solid var(--border);border-radius:5px;padding:5px 4px}
.xval{font-size:15px;font-weight:700;font-family:'DM Mono',monospace;color:var(--text);line-height:1}
.xlbl{font-size:9px;color:var(--tm);margin-top:1px}

/* Scorecard */
.sc-wrap{background:#ffffff;border:1px solid var(--border);border-radius:var(--r);margin-bottom:6px;overflow:hidden}
.sc-hdr{padding:6px 10px;font-size:10px;font-weight:700;color:var(--tm);text-transform:uppercase;letter-spacing:.08em;font-family:'DM Mono',monospace;border-bottom:1px solid var(--border);background:var(--surface2)}
.sct{width:100%;border-collapse:collapse;font-size:11px}
.sct th{text-align:right;font-size:9px;font-weight:700;color:var(--tm);text-transform:uppercase;letter-spacing:.06em;padding:5px 7px;border-bottom:1px solid var(--border);font-family:'DM Mono',monospace}
.sct th:first-child{text-align:left}
.sct td{padding:6px 7px;border-bottom:1px solid rgba(48,54,61,.4);color:var(--text);text-align:right;font-family:'DM Mono',monospace}
.sct td:first-child{text-align:left;font-family:'DM Sans',sans-serif;font-weight:500}
.sct tr:last-child td{border-bottom:none}
.sct tr.dim td{color:var(--tm)}

/* Actions */
.act-row{display:flex;gap:6px;margin-bottom:20px}
.act{flex:1;padding:8px;border-radius:5px;border:1px solid var(--border);background:#ffffff;color:var(--ts);font-family:'DM Sans',sans-serif;font-size:11px;font-weight:600;cursor:pointer;transition:all .15s}
.act:hover{border-color:var(--accent);color:var(--al);background:var(--ag)}
.act.d{border-color:rgba(248,81,73,.35);color:var(--danger)}
.act.d:hover{background:var(--dg);border-color:var(--danger)}

/* Innings card */
.inn-card{background:#ffffff;border:1.5px solid var(--accent);border-radius:var(--r);padding:12px;text-align:center;margin-bottom:10px}
.inn-ttl{font-size:10px;font-weight:700;color:var(--al);text-transform:uppercase;letter-spacing:.1em;font-family:'DM Mono',monospace;margin-bottom:5px}
.inn-score{font-family:'DM Mono',monospace;font-size:28px;font-weight:500;color:var(--text)}
.inn-detail{font-size:12px;color:var(--ts);margin-top:2px;font-family:'DM Mono',monospace}
.inn-hint{font-size:11px;color:var(--tm);margin-top:7px;line-height:1.4}

/* Setup hero */
.hero{padding:12px 0 8px;text-align:center}
.hero h2{font-size:17px;font-weight:700;color:var(--text);margin-bottom:2px}
.hero p{font-size:12px;color:var(--ts)}

/* Empty */
.empty{text-align:center;padding:60px 20px;color:var(--tm)}
.empty .ic{font-size:34px;margin-bottom:8px}
.empty h3{font-size:14px;font-weight:600;color:var(--ts);margin-bottom:4px}
.empty p{font-size:12px;line-height:1.5}

/* Match Scorecard */
.msc-wrap{padding:12px;max-width:500px;margin:0 auto;padding-bottom:40px}
.msc-result{background:#fff;border:2px solid var(--accent);border-radius:10px;padding:18px;text-align:center;margin-bottom:14px}
.msc-winner{font-size:22px;font-weight:800;color:var(--text);margin-bottom:4px}
.msc-margin{font-size:13px;color:var(--ts);font-family:'DM Mono',monospace}
.msc-scores{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px}
.msc-team-score{background:var(--surface2);border-radius:6px;padding:10px;text-align:center}
.msc-team-name{font-size:10px;font-weight:700;color:var(--ts);text-transform:uppercase;letter-spacing:.08em;margin-bottom:4px}
.msc-team-total{font-size:22px;font-weight:800;color:var(--text);font-family:'DM Mono',monospace}
.msc-team-detail{font-size:11px;color:var(--ts);font-family:'DM Mono',monospace;margin-top:2px}
.msc-inn{background:#fff;border:1px solid var(--border);border-radius:8px;margin-bottom:12px;overflow:hidden}
.msc-inn-hdr{background:var(--surface2);padding:8px 12px;display:flex;align-items:center;justify-content:space-between}
.msc-inn-title{font-size:11px;font-weight:700;color:var(--text);text-transform:uppercase;letter-spacing:.08em}
.msc-inn-score{font-size:13px;font-weight:800;color:var(--text);font-family:'DM Mono',monospace}
.msc-section{padding:0 0 4px}
.msc-section-hdr{padding:6px 12px;font-size:9px;font-weight:700;color:var(--ts);text-transform:uppercase;letter-spacing:.1em;border-bottom:1px solid var(--border);background:#fafbfc}
.msc-bat-row{display:flex;align-items:flex-start;padding:7px 12px;border-bottom:1px solid rgba(208,215,222,.5);gap:6px}
.msc-bat-row:last-child{border-bottom:none}
.msc-bat-name{font-size:13px;font-weight:600;color:var(--text);min-width:0;flex:1}
.msc-bat-how{font-size:10px;color:var(--ts);font-family:'DM Mono',monospace;margin-top:1px}
.msc-bat-notout{font-size:10px;color:var(--accent);font-family:'DM Mono',monospace;margin-top:1px}
.msc-bat-stats{display:flex;gap:10px;flex-shrink:0;align-items:flex-start;padding-top:1px}
.msc-stat{text-align:right}
.msc-stat-val{font-size:13px;font-weight:700;color:var(--text);font-family:'DM Mono',monospace}
.msc-stat-lbl{font-size:9px;color:var(--ts)}
.msc-bowl-row{display:grid;grid-template-columns:1fr auto auto auto auto auto;gap:6px;align-items:center;padding:7px 12px;border-bottom:1px solid rgba(208,215,222,.5);font-family:'DM Mono',monospace;font-size:12px}
.msc-bowl-row:last-child{border-bottom:none}
.msc-bowl-name{font-size:13px;font-weight:600;color:var(--text);font-family:'DM Sans',sans-serif}
.msc-bowl-num{text-align:right;color:var(--ts)}
.msc-bowl-num.bold{color:var(--text);font-weight:700}
.msc-extras{padding:7px 12px;font-size:11px;color:var(--ts);font-family:'DM Mono',monospace;border-top:1px solid var(--border)}
.msc-actions{display:flex;gap:8px;margin-top:14px}
/* Toast */
#toast{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);padding:7px 14px;border-radius:6px;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:600;z-index:9999;transition:opacity .3s;white-space:nowrap;pointer-events:none;opacity:0}

/* Modal */
.mo{position:fixed;inset:0;background:rgba(0,0,0,.75);display:flex;align-items:flex-end;justify-content:center;z-index:1000;padding:0}
/* Dismissal sheet */
.dism-sheet{background:#ffffff;border:1px solid var(--border);border-radius:12px 12px 0 0;padding:16px;width:100%;max-width:500px}
.dism-title{font-size:13px;font-weight:700;color:var(--text);margin-bottom:4px;text-align:center}
.dism-sub{font-size:11px;color:var(--ts);text-align:center;margin-bottom:14px;font-family:'DM Mono',monospace}
.dism-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.dism-btn{padding:12px 8px;border-radius:var(--r);border:1.5px solid var(--border);background:#f6f8fa;color:var(--text);font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:all .15s;text-align:center}
.dism-btn:hover{border-color:var(--danger);background:var(--dg);color:var(--danger)}
.dism-btn .dism-icon{font-size:18px;display:block;margin-bottom:3px}
.dism-btn .dism-lbl{font-size:11px;color:var(--ts);display:block}
.dism-cancel{width:100%;padding:10px;border-radius:var(--r);border:1px solid var(--border);background:#f6f8fa;color:var(--ts);font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;cursor:pointer}
.dism-cancel:hover{color:var(--text);background:var(--surface2)}
.mo-centre{align-items:center!important}
.modal{background:#ffffff;border:1px solid var(--border);border-radius:10px;padding:18px;width:100%;max-width:330px}
.modal h3{font-size:15px;font-weight:700;color:var(--text);margin-bottom:5px}
.modal p{color:var(--ts);font-size:13px;line-height:1.5;margin-bottom:14px}
.ma{display:flex;gap:7px}
.mbtn{flex:1;padding:8px;border-radius:5px;border:none;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:opacity .15s}
.mbtn.c{background:#f6f8fa;color:var(--text);border:1px solid var(--border)}
.mbtn.ok{background:var(--danger);color:#fff}
.mbtn:hover{opacity:.85}
</style>
</head>

<script>
const SYNC_URL = "https://script.google.com/macros/s/AKfycbzq2ycyW1rNR2LlQaPmQwvmzu_TxrP5zXjLddC0az-vw1Ssd9rd-iZnBtIofyYhd2QK/exec";
const MTYPES = ["League","Cup","Friendly","Knockout","T20 League","T20 Cup"];

function blank() {
  return {
    sheetName:"", battingTeam:"Athlone CC", fieldingTeam:"",
    totalOvers:20, matchType:"League", tossWinner:"", tossDecision:"bat",
    innings:1, active:false,
    runs:0, wickets:0, balls:0, totalBalls:0,
    extras:{wides:0,noBalls:0,byes:0,legByes:0},
    striker:"", nonStriker:"", bowler:"", bowler2:"",
    prevBowler:"", // the bowler before current — used to auto-alternate
    freeHit:false,   // next ball is a free hit (after a no ball)
    batsmen:{}, bowlers:{}, ballLog:[],
    target:null, innings1:null,
    battingSquad:Array(12).fill(""), fieldingSquad:Array(12).fill(""),
    // Saved innings data for final scorecard
    inn1:{team:'',runs:0,wickets:0,totalBalls:0,batsmen:{},bowlers:{},extras:{wides:0,noBalls:0,byes:0,legByes:0}},
    inn2:{team:'',runs:0,wickets:0,totalBalls:0,batsmen:{},bowlers:{},extras:{wides:0,noBalls:0,byes:0,legByes:0}},
    finished:false, result:'',
  };
}

let M = blank();
let undoStack = [];
const UNDO_LIMIT = 50;

// Call before every state-mutating action to enable undo
function snapshot(){
  undoStack.push(JSON.parse(JSON.stringify(M)));
  if(undoStack.length > UNDO_LIMIT) undoStack.shift();
}

function save() { try{localStorage.setItem('acc_s3',JSON.stringify(M));}catch(e){} }
function load() { try{const d=localStorage.getItem('acc_s3');if(d)M={...blank(),...JSON.parse(d)};}catch(e){} }

// Build a human-readable dismissal description for the scorecard
function dismDesc(d){
  if(!d.howOut) return 'out';
  const how=d.howOut;
  const by=d.dismissedBy||'';
  if(how==='Bowled')        return by?`b ${by}`:'Bowled';
  if(how==='LBW')           return by?`lbw b ${by}`:'LBW';
  if(how==='Caught')        return by?`c & b ${by}`:'Caught';
  if(how==='Caught Behind') return by?`c behind b ${by}`:'Caught Behind';
  if(how==='Stumped')       return by?`st b ${by}`:'Stumped';
  if(how==='Hit Wicket')    return by?`hit wkt b ${by}`:'Hit Wicket';
  if(how==='Run Out')       return 'run out';
  return how;
}
function getBat(n){if(!M.batsmen[n])M.batsmen[n]={runs:0,balls:0,fours:0,sixes:0,out:false,howOut:'',dismissedBy:''};return M.batsmen[n]}
function getBowl(n){if(!M.bowlers[n])M.bowlers[n]={balls:0,runs:0,wickets:0,wides:0,noBalls:0};return M.bowlers[n]}
function ovs(b){return`${Math.floor(b/6)}.${b%6}`}
function rr(){return M.totalBalls?((M.runs/M.totalBalls)*6).toFixed(2):"0.00"}
function rrr(){if(!M.target)return"—";const bl=M.totalOvers*6-M.totalBalls;return bl>0?(((M.target-M.runs)/bl)*6).toFixed(2):"—"}
function bats(){return M.battingSquad.filter(Boolean)}
function bowls(){return M.fieldingSquad.filter(Boolean)}

// Returns { battingTeam, fieldingTeam, battingSquad, fieldingSquad }
// resolved from the toss outcome for innings 1.
// In innings 2 the squads are already swapped by endInnings() so use M directly.
function tossSquads(){
  if(M.innings===2){
    return {battingTeam:M.battingTeam,fieldingTeam:M.fieldingTeam,
            battingSquad:M.battingSquad,fieldingSquad:M.fieldingSquad};
  }
  const winner=M.tossWinner||'';
  const dec=M.tossDecision||'bat';
  const ourTeam=M.battingTeam||'';
  const oppTeam=M.fieldingTeam||'';
  // ourTeamBats if: our team won and chose bat, OR opponent won and chose field
  const ourTeamWon=(winner===ourTeam);
  const ourTeamBats=ourTeamWon?(dec==='bat'):(dec==='field');
  if(ourTeamBats){
    return {battingTeam:ourTeam,fieldingTeam:oppTeam,
            battingSquad:M.battingSquad,fieldingSquad:M.fieldingSquad};
  } else {
    return {battingTeam:oppTeam,fieldingTeam:ourTeam,
            battingSquad:M.fieldingSquad,fieldingSquad:M.battingSquad};
  }
}
function esc(s){return s?String(s).replace(/&/g,"&amp;").replace(/"/g,"&quot;").replace(/</g,"&lt;").replace(/>/g,"&gt;"):""}

function updateHdr(){
  const hm=document.getElementById('hdr-match'),hs=document.getElementById('hdr-sub'),ld=document.getElementById('live-dot');
  if(M.active){hm.textContent=`${M.battingTeam} vs ${M.fieldingTeam}`;hs.textContent=`Innings ${M.innings} · ${M.matchType}`;ld.style.display='block';}
  else if(M.battingTeam&&M.fieldingTeam){hm.textContent=`${M.battingTeam} vs ${M.fieldingTeam}`;hs.textContent=M.innings===2?'2nd Innings Setup':'Match Setup';ld.style.display='none';}
  else{hm.textContent='Athlone CC · Scorer';hs.textContent='No match active';ld.style.display='none';}
}

function render(){updateHdr();document.getElementById('sc').innerHTML=M.finished?renderMatchScorecard():M.active?live():setup()}

/* ── SETUP ── */
function setup(){
  let h=`<div class="hero"><h2>🏏 Match Setup</h2><p>Fill in the details to start scoring</p></div>`;

  h+=`<div class="card"><div class="card-ttl">Match Details</div>
    <div class="fld"><label class="lbl">Our Team</label><input class="inp" id="sc-bat" placeholder="e.g. Athlone 3" value="${esc(M.battingTeam)}" oninput="M.battingTeam=this.value.trim();updateTossButtons()"></div>
    <div class="fld"><label class="lbl">Opponents</label><input class="inp" id="sc-opp" placeholder="e.g. DLR County 5" value="${esc(M.fieldingTeam)}" oninput="M.fieldingTeam=this.value.trim();updateTossButtons()"></div>
    <div class="g2">
      <div class="fld"><label class="lbl">Match Type</label><select class="inp" id="sc-mt">${MTYPES.map(t=>`<option${M.matchType===t?' selected':''}>${t}</option>`).join('')}</select></div>
      <div class="fld"><label class="lbl">Overs</label><input class="inp" id="sc-ov" type="number" value="${M.totalOvers}" min="1" max="100" style="text-align:center"></div>
    </div>
  </div>`;

  const t1 = M.battingTeam || 'Our Team';
  const t2 = M.fieldingTeam || 'Opponents';
  const tw = M.tossWinner || '';
  h+=`<div class="card"><div class="card-ttl">Toss</div>
    <div class="fld"><label class="lbl">Toss Winner</label>
      <div class="toss-g">
        <button class="toss-btn${tw===t1?' on':''}" id="tw-t1" onclick="setTossWinner('tw-t1','tw-t2',this.textContent.trim())">${t1}</button>
        <button class="toss-btn${tw===t2?' on':''}" id="tw-t2" onclick="setTossWinner('tw-t2','tw-t1',this.textContent.trim())">${t2}</button>
      </div>
    </div>
    <div class="fld"><label class="lbl">Chose To…</label><div class="toss-g">
      <button class="toss-btn${(M.tossDecision||'bat')==='bat'?' on':''}" id="toss-bat" onclick="setToss(this,'bat')">🏏 Bat</button>
      <button class="toss-btn${M.tossDecision==='field'?' on':''}" id="toss-field" onclick="setToss(this,'field')">🥎 Field</button>
    </div></div>
  </div>`;

  const _ts=tossSquads();
  const _batLbl=_ts.battingTeam||'Batting XI';
  const _fldLbl=_ts.fieldingTeam||'Fielding XI';
  // We always pass M.battingSquad/M.fieldingSquad to rosterRows with a side key of 'bat'/'fld'
  // so upRoster can correctly identify which array to update regardless of toss swap.
  h+=`<div class="card"><div class="card-ttl" id="squad-bat-ttl">${_batLbl} <span style="font-weight:400;color:var(--ts);text-transform:none;letter-spacing:0">🏏 Batting</span></div><div class="roster">${rosterRows(_ts.battingSquad, _batLbl, 'squad-bat-hdr', _ts.battingSquad===M.battingSquad?'bat':'fld')}</div></div>`;
  h+=`<div class="card"><div class="card-ttl" id="squad-fld-ttl">${_fldLbl} <span style="font-weight:400;color:var(--ts);text-transform:none;letter-spacing:0">🥎 Fielding</span></div><div class="roster">${rosterRows(_ts.fieldingSquad, _fldLbl, 'squad-fld-hdr', _ts.fieldingSquad===M.fieldingSquad?'fld':'bat')}</div></div>`;

  h+=`<div class="card"><div class="card-ttl">Opening Players</div>
    <div class="fld"><label class="lbl">🏏 Striker</label><div class="pw">
      <input class="inp" id="sc-str" placeholder="Batsman on strike" value="${esc(M.striker)}"
        oninput="showS('sc-str','sb','bat')" onfocus="showS('sc-str','sb','bat')" onblur="hideS('sb')">
      <div class="suggs" id="sb"></div>
    </div></div>
    <div class="fld"><label class="lbl">🏃 Non-Striker</label><div class="pw">
      <input class="inp" id="sc-ns" placeholder="Other opener" value="${esc(M.nonStriker)}"
        oninput="showS('sc-ns','sn','bat')" onfocus="showS('sc-ns','sn','bat')" onblur="hideS('sn')">
      <div class="suggs" id="sn"></div>
    </div></div>
    <div class="g2">
      <div class="fld"><label class="lbl">⚡ 1st Bowler</label><div class="pw">
        <input class="inp" id="sc-b1" placeholder="1st over bowler" value="${esc(M.bowler)}"
          oninput="showS('sc-b1','s1','bowl')" onfocus="showS('sc-b1','s1','bowl')" onblur="hideS('s1')">
        <div class="suggs" id="s1"></div>
      </div></div>
      <div class="fld"><label class="lbl">⚡ 2nd Bowler</label><div class="pw">
        <input class="inp" id="sc-b2" placeholder="Optional" value="${esc(M.bowler2||'')}"
          oninput="showS('sc-b2','s2','bowl')" onfocus="showS('sc-b2','s2','bowl')" onblur="hideS('s2')">
        <div class="suggs" id="s2"></div>
      </div></div>
    </div>
  </div>`;

  if(M.innings1){h+=`<div class="inn-card">
    <div class="inn-ttl">1st Innings Complete</div>
    <div class="inn-score">${M.innings1.team}: ${M.innings1.runs}/${M.innings1.wickets}</div>
    <div class="inn-detail">${ovs(M.innings1.totalBalls)} overs · Target: ${M.innings1.runs+1}</div>
    <div class="inn-hint">Update the batting & bowling details above for the 2nd innings, then tap Start.</div>
  </div>`;}

  h+=`<button class="sbtn" onclick="startScoring()"><svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>Start Scoring</button>`;
  // Only show delete if match has some data
  if(M.battingTeam||M.fieldingTeam||M.tossWinner){
    h+=`<button onclick="deleteMatch()" style="width:100%;padding:8px;border-radius:var(--r);border:1px solid rgba(248,81,73,.35);background:transparent;color:var(--danger);font-family:'DM Sans',sans-serif;font-size:12px;font-weight:600;cursor:pointer;margin-bottom:16px;transition:all .15s" onmouseover="this.style.background='rgba(248,81,73,.08)'" onmouseout="this.style.background='transparent'">🗑 Delete Match</button>`;
  }
  return h;
}

function rosterRows(sq,side,headerId,sideKey){
  const arr=(sq&&sq.length>=12)?sq:[...(sq||[]),...Array(12).fill('')].slice(0,12);
  const f=arr.slice(0,11).filter(Boolean).length;
  const rows = arr.map((n,i)=>{
    const is12th = i===11;
    return `<div class="r-row${is12th?' r-row-12th':''}">
      <span class="r-num" style="${is12th?'color:var(--warn);font-size:9px;width:28px;text-align:right':''}">
        ${is12th?'12th':''+( i+1)}
      </span>
      <input class="r-inp" type="text" placeholder="${is12th?'12th Man':('Player '+(i+1))}" value="${esc(n)}"
        style="${is12th?'color:var(--warn)':''}"
        onchange="upRoster('${sideKey||side}',${i},this.value)" oninput="upRoster('${sideKey||side}',${i},this.value)">
    </div>`;
  }).join('');
  return `<div class="roster-hdr"><span${headerId?` id="${headerId}"`:''}>${side}</span><span style="font-size:9px;color:var(--tm)">${f}/11 + 12th</span></div>
    <div class="roster-scroll">${rows}</div>`;
}

/* ── LIVE ── */
function live(){
  const over=Math.floor(M.totalBalls/6)+1;
  const done=M.balls>=6;
  const need=M.target?`Need ${Math.max(0,M.target-M.runs)} off ${Math.max(0,M.totalOvers*6-M.totalBalls)} balls`:'';
  const last6=M.ballLog.slice(-6);
  let h='';

  // Scoreboard
  h+=`<div class="scoreboard">
    <div class="sb-match">${M.battingTeam} vs ${M.fieldingTeam}${M.matchType?' · '+M.matchType:''}</div>
    <div class="sb-score">${M.runs}<span class="sb-wkts">/${M.wickets}</span></div>
    <div class="sb-meta">${ovs(M.totalBalls)} / ${M.totalOvers} ov &nbsp;·&nbsp; RR ${rr()}</div>
    ${need?`<div class="sb-tgt">${need} &nbsp;·&nbsp; RRR ${rrr()}</div>`:''}
    ${M.tossWinner?`<div class="sb-toss">🪙 ${M.tossWinner} won toss · ${M.tossDecision}</div>`:''}
  </div>`;

  // Batsmen
  const sd=M.striker?getBat(M.striker):null;
  const nd=M.nonStriker?getBat(M.nonStriker):null;
  h+=`<div class="bat-row">
    <div class="bat-card str" onclick="swapEnds()">
      <div class="str-ico">🏏</div>
      <div class="bat-lbl">On Strike</div>
      <div class="bat-name">${M.striker||'—'}</div>
      ${sd?`<div class="bat-stats">${sd.runs}(${sd.balls})${sd.fours?' ·'+sd.fours+'×4':''}${sd.sixes?' ·'+sd.sixes+'×6':''}</div>`:''}
    </div>
    <div class="bat-card" onclick="swapEnds()">
      <div class="bat-lbl">Non-Striker</div>
      <div class="bat-name">${M.nonStriker||'—'}</div>
      ${nd?`<div class="bat-stats">${nd.runs}(${nd.balls})</div>`:''}
    </div>
  </div>`;

  // Bowler + over dots
  const bd=M.bowler?getBowl(M.bowler):null;
  const dotHtml = last6.map(b=>{let c='';if(b==='W')c='W';else if(b==='6')c='six';else if(b==='4')c='four';else if(b==='Wd'||b==='Nb')c='xtra';return`<div class="dot ${c}">${b}</div>`;}).join('');
  const empties = Array(Math.max(0,6-last6.length)).fill('<div class="dot mt"></div>').join('');
  h+=`<div class="bowl-strip">
    <div>
      <div class="bowl-lbl">Bowler · Over ${over}</div>
      <div class="bowl-name">${M.bowler||'—'}</div>
      ${bd?`<div class="bowl-stats">${bd.runs}R ${bd.wickets}W · ${ovs(bd.balls)}ov</div>`:''}
    </div>
    <div class="dots">${dotHtml}${empties}</div>
  </div>`;

  if(done){
    const autoNext = M.prevBowler || '';
    const isAuto = !!autoNext;
    h+=`<div class="over-done">
      <div class="over-done-ttl">⚡ Over Complete — Next Bowler</div>
      <div class="fld" style="text-align:left;margin-bottom:10px">
        <label class="lbl" style="margin-bottom:4px">${isAuto ? `Auto: ${autoNext} — or type to change` : 'New bowler name'}</label>
        <div class="pw">
          <input class="inp" id="sc-nb" placeholder="${isAuto ? autoNext : 'Bowler name'}"
            value=""
            oninput="showS('sc-nb','snb',false)" onfocus="showS('sc-nb','snb',false)" onblur="hideS('snb')">
          <div class="suggs" id="snb"></div>
        </div>
      </div>
      <button class="sbtn" style="margin-bottom:0" onclick="endOver()">
        ${isAuto ? `▶ ${autoNext} to bowl` : 'End Over →'}
      </button>
    </div>`;
  } else {
    // Show FREE HIT banner if active
  if(M.freeHit){
    h+=`<div style="background:rgba(227,179,65,.12);border:2px solid var(--warn);border-radius:var(--r);padding:8px 12px;margin-bottom:6px;text-align:center;font-weight:700;color:var(--warn);font-family:'DM Mono',monospace;font-size:13px;letter-spacing:.06em">⚡ FREE HIT</div>`;
  }
  h+=`<div class="rg4">${['0','1','2','3'].map(r=>`<button class="rbtn" onclick="addBall('${r}')">${r}</button>`).join('')}</div>
    <div class="rg3">
      <button class="rbtn four" onclick="addBall('4')">4</button>
      <button class="rbtn six" onclick="addBall('6')">6</button>
      <button class="rbtn out" onclick="showDismissal()">OUT</button>
    </div>
    <div class="eg">
      <button class="ebtn w" onclick="addExtra('wide')">Wide</button>
      <button class="ebtn nb" onclick="addExtra('noball')">No Ball</button>
      <button class="ebtn" onclick="addExtra('bye')">Bye</button>
      <button class="ebtn" onclick="addExtra('legbye')">Leg Bye</button>
    </div>
`;
  }
  h+=`<button class="undo" onclick="undoLast()">↩ Undo</button>`;

  // Player changes
  h+=`<div class="chg-card"><div class="chg-ttl">Player Changes</div>
    <div class="chg-row">
      <div class="fld"><label class="lbl">New Batsman</label><div class="pw">
        <input class="inp" id="sc-newb" placeholder="Name" oninput="showS('sc-newb','snb2',true)" onfocus="showS('sc-newb','snb2',true)" onblur="hideS('snb2')">
        <div class="suggs" id="snb2"></div>
      </div></div>
      <button class="set-btn" onclick="newBat()">✓ Set</button>
    </div>
    <div class="chg-row">
      <div class="fld"><label class="lbl">Change Bowler</label><div class="pw">
        <input class="inp" id="sc-cb" placeholder="Name" oninput="showS('sc-cb','scb',false)" onfocus="showS('sc-cb','scb',false)" onblur="hideS('scb')">
        <div class="suggs" id="scb"></div>
      </div></div>
      <button class="set-btn" onclick="chgBowl()">✓ Set</button>
    </div>
  </div>`;

  // Extras
  h+=`<div class="xbar">
    <div class="xstat"><div class="xval" style="color:var(--warn)">${M.extras.wides}</div><div class="xlbl">Wides</div></div>
    <div class="xstat"><div class="xval" style="color:var(--warn)">${M.extras.noBalls}</div><div class="xlbl">NoBalls</div></div>
    <div class="xstat"><div class="xval">${M.extras.byes}</div><div class="xlbl">Byes</div></div>
    <div class="xstat"><div class="xval">${M.extras.legByes}</div><div class="xlbl">Leg Byes</div></div>

  // Batting table
  const be=Object.entries(M.batsmen);
  if(be.length){h+=`<div class="sc-wrap"><div class="sc-hdr">Batting</div><table class="sct">
    <thead><tr><th>Batsman</th><th>R</th><th>B</th><th>4s</th><th>6s</th><th>SR</th></tr></thead>
    <tbody>${be.map(([n,d])=>`<tr class="${d.out?'dim':''}">
      <td>
        <div style="font-weight:500">${n}${M.striker===n&&!d.out?' <span style="color:var(--al);font-size:9px">★</span>':''}</div>
        ${d.out?`<div style="font-size:9px;color:var(--danger);font-family:'DM Mono',monospace;line-height:1.4">${dismDesc(d)}</div>`:''}
      </td>
      <td>${d.runs}</td><td>${d.balls}</td><td>${d.fours}</td><td>${d.sixes}</td>

  </table></div>`;}

  // Bowling table
  const boe=Object.entries(M.bowlers);
  if(boe.length){h+=`<div class="sc-wrap"><div class="sc-hdr">Bowling</div><table class="sct">
    <thead><tr><th>Bowler</th><th>O</th><th>R</th><th>W</th><th>Wd</th><th>Nb</th></tr></thead>
    <tbody>${boe.map(([n,d])=>`<tr${M.bowler===n?' style="color:var(--al)"':''}>
      <td>${n}${M.bowler===n?' ▸':''}</td>
      <td>${ovs(d.balls)}</td><td>${d.runs}</td><td>${d.wickets}</td><td>${d.wides}</td><td>${d.noBalls}</td>
    </tr>`).join('')}</tbody>
  </table></div>`;}

  h+=`<div class="act-row">
    ${M.innings===1?`<button class="act" onclick="endInnings()">End 1st Innings</button>`:`<button class="act" style="border-color:var(--accent);color:var(--accent)" onclick="endMatch()">🏆 End Match</button>`}
    <button class="act d" onclick="confirmReset()">↺ Reset</button>
    <button class="act d" onclick="deleteMatch()">🗑 Delete</button>
  </div>`;

  return h;
}

/* ── ACTIONS ── */
function addBall(r){
  r=parseInt(r);
  snapshot();
  const bat=getBat(M.striker),bowl=getBowl(M.bowler);
  bat.runs+=r;bat.balls++;if(r===4)bat.fours++;if(r===6)bat.sixes++;
  M.runs+=r;M.balls++;M.totalBalls++;
  bowl.runs+=r;bowl.balls++;if(M.balls>=6)bowl.overs++;
  M.ballLog.push(String(r));
  if(r%2!==0){const t=M.striker;M.striker=M.nonStriker;M.nonStriker=t;}
  if(M.target&&M.runs>=M.target)toast(`🏆 ${M.battingTeam} wins!`,'success');
  M.freeHit=false; // free hit used up
  save();render();
}
function addExtra(type){
  snapshot();
  if(type==='wide'){
    // Wide: +1 run, NOT a legal ball, clears free hit (wide during free hit is still a wide)
    M.runs++;M.extras.wides++;
    getBowl(M.bowler).runs++;getBowl(M.bowler).wides++;
    M.ballLog.push('Wd');
    M.freeHit=false; // wide re-bowled; free hit stays only if no ball caused it, wide cancels
  }
  else if(type==='noball'){
    // No ball: +1 run, NOT a legal ball, NEXT ball is a free hit
    M.runs++;M.extras.noBalls++;
    getBowl(M.bowler).runs++;getBowl(M.bowler).noBalls++;
    M.ballLog.push('Nb');
    M.freeHit=true;  // next delivery is a free hit
  }
  else if(type==='bye'){
    M.runs++;M.extras.byes++;M.balls++;M.totalBalls++;
    getBat(M.striker).balls++;getBowl(M.bowler).balls++;
    M.ballLog.push('B');
    M.freeHit=false;
  }
  else if(type==='legbye'){
    M.runs++;M.extras.legByes++;M.balls++;M.totalBalls++;
    getBat(M.striker).balls++;getBowl(M.bowler).balls++;
    M.ballLog.push('Lb');
    M.freeHit=false;
  }
  save();render();
}
// Dismissal types: [icon, label, creditsBowler]
const DISMISSALS=[
  ['🏏','Bowled',true],
  ['🦵','LBW',true],
  ['🤲','Caught',true],
  ['🧤','Caught Behind',true],
  ['🏃','Run Out',false],
  ['🧤','Stumped',true],
  ['🏏','Hit Wicket',true],
  ['✋','Handled Ball',false],
  ['⛔','Obstructing Field',false],
  ['🔟','Hit Ball Twice',false],
  ['⏰','Timed Out',false],
];
function showDismissal(){
  const striker=M.striker||'Batsman';
  // On a free hit, batsman can only be out run out
  const validDismissals = M.freeHit
    ? DISMISSALS.filter(([,lbl])=>lbl==='Run Out')
    : DISMISSALS;
  const freeHitNote = M.freeHit ? '<div style="font-size:11px;color:var(--warn);text-align:center;margin-bottom:10px;font-weight:600">⚡ FREE HIT — only Run Out applies</div>' : '';
  const btns=validDismissals.map(([icon,lbl,credits])=>
    `<button class="dism-btn" onclick="confirmWicket('${lbl}',${credits})">
      <span class="dism-icon">${icon}</span>${lbl}
      <span class="dism-lbl">${credits?'Bowler credited':'No bowl credit'}</span>
    </button>`
  ).join('');
  document.body.insertAdjacentHTML('beforeend',`
    <div class="mo" id="dism-modal" onclick="if(event.target===this)closeDismissal()">
      <div class="dism-sheet">
        <div class="dism-title">How was ${striker} dismissed?</div>
        <div class="dism-sub">${striker} · ${getBat(striker).runs}(${getBat(striker).balls})</div>
        ${freeHitNote}
        <div class="dism-grid">${btns}</div>
        <button class="dism-cancel" onclick="closeDismissal()">Cancel</button>
      </div>
    </div>`);
}
function closeDismissal(){document.getElementById('dism-modal')?.remove();}
function confirmWicket(howOut,creditsBowler){
  closeDismissal();
  snapshot();
  M.wickets++;M.balls++;M.totalBalls++;
  const bat=getBat(M.striker);
  bat.balls++;bat.out=true;bat.howOut=howOut;bat.dismissedBy=M.bowler||'';
  const bowl=getBowl(M.bowler);
  bowl.balls++;
  if(creditsBowler)bowl.wickets++;
  M.ballLog.push('W');
  M.freeHit=false;
  save();render();
}
function addWicket(){showDismissal();}
function undoLast(){
  if(!undoStack.length){toast('Nothing to undo','warn');return;}
  M=undoStack.pop();
  save();render();
}
function endOver(){
  snapshot();
  const inp=document.getElementById('sc-nb');
  const typed=inp?.value?.trim()||'';
  // Auto-alternate: next is prevBowler; if scorer types someone new, they take the slot
  const name = typed || M.prevBowler;
  if(!name){toast('Enter next bowler name','warn');return;}
  // Shift: current bowler becomes prev, new name becomes current
  M.prevBowler = M.bowler;
  M.bowler=name;
  getBowl(name);M.balls=0;M.ballLog=[];
  const t=M.striker;M.striker=M.nonStriker;M.nonStriker=t;
  save();render();
}
function newBat(){
  snapshot();
  const n=document.getElementById('sc-newb')?.value?.trim();
  if(!n)return;M.striker=n;getBat(n);save();render();
}
function swapEnds(){snapshot();const t=M.striker;M.striker=M.nonStriker;M.nonStriker=t;save();render();}
function chgBowl(){snapshot();const n=document.getElementById('sc-cb')?.value?.trim();if(!n)return;M.prevBowler=M.bowler;M.bowler=n;getBowl(n);save();render();}
function endInnings(){
  snapshot();
  // Save complete innings 1 data for final scorecard
  M.inn1={team:M.battingTeam,runs:M.runs,wickets:M.wickets,totalBalls:M.totalBalls,
    batsmen:JSON.parse(JSON.stringify(M.batsmen)),
    bowlers:JSON.parse(JSON.stringify(M.bowlers)),
    extras:{...M.extras}};
  M.innings1={team:M.battingTeam,runs:M.runs,wickets:M.wickets,totalBalls:M.totalBalls};
  M.target=M.runs+1;
  const bat2=M.fieldingTeam,fld2=M.battingTeam;
  const sq2=[...M.fieldingSquad],sqf2=[...M.battingSquad];
  Object.assign(M,{active:false,innings:2,battingTeam:bat2,fieldingTeam:fld2,battingSquad:sq2,fieldingSquad:sqf2,
    runs:0,wickets:0,balls:0,totalBalls:0,extras:{wides:0,noBalls:0,byes:0,legByes:0},striker:'',nonStriker:'',bowler:'',batsmen:{},bowlers:{},ballLog:[]});
  save();render();
}
function endMatch(){
  confirm2('End the match?','This will finalise the scorecard and show the result.',()=>{
    snapshot();
    // Save innings 2 data
    M.inn2={team:M.battingTeam,runs:M.runs,wickets:M.wickets,totalBalls:M.totalBalls,
      batsmen:JSON.parse(JSON.stringify(M.batsmen)),
      bowlers:JSON.parse(JSON.stringify(M.bowlers)),
      extras:{...M.extras}};
    // Work out result
    const i1=M.inn1, i2=M.inn2;
    const t1=i1.team||'Team 1', t2=i2.team||'Team 2';
    const runs1=i1.runs, runs2=i2.runs;
    const wkts2=i2.wickets;
    if(runs2>runs1){
      const winsBy=10-wkts2;
      M.result=`${t2} won by ${winsBy} wicket${winsBy!==1?'s':''}`;
    } else if(runs1>runs2){
      const winsBy=runs1-runs2;
      M.result=`${t1} won by ${winsBy} run${winsBy!==1?'s':''}`;
    } else {
      M.result='Match tied';
    }
    M.finished=true;
    M.active=false;
    save();render();
  });
}

function renderMatchScorecard(){
  const i1=M.inn1, i2=M.inn2;
  const t1=i1.team||'Team 1', t2=i2.team||'Team 2';
  let h=`<div class="msc-wrap">`;

  // Result banner
  h+=`<div class="msc-result">
    <div class="msc-winner">🏆 ${M.result}</div>
    <div class="msc-scores">
      <div class="msc-team-score">
        <div class="msc-team-name">${t1} — 1st Innings</div>
        <div class="msc-team-total">${i1.runs}/${i1.wickets}</div>
        <div class="msc-team-detail">${ovs(i1.totalBalls)} overs</div>
      </div>
      <div class="msc-team-score">
        <div class="msc-team-name">${t2} — 2nd Innings</div>
        <div class="msc-team-total">${i2.runs}/${i2.wickets}</div>
        <div class="msc-team-detail">${ovs(i2.totalBalls)} overs</div>
      </div>
    </div>
  </div>`;

  // Render both innings
  [i1,i2].forEach((inn,idx)=>{
    const teamName=idx===0?t1:t2;
    const oppName=idx===0?t2:t1;
    const batEntries=Object.entries(inn.batsmen||{});
    const bowlEntries=Object.entries(inn.bowlers||{});
    const ex=inn.extras||{};
    const totalExtras=(ex.wides||0)+(ex.noBalls||0)+(ex.byes||0)+(ex.legByes||0);

    h+=`<div class="msc-inn">
      <div class="msc-inn-hdr">
        <div class="msc-inn-title">${teamName} — ${idx===0?'1st':'2nd'} Innings</div>
        <div class="msc-inn-score">${inn.runs}/${inn.wickets} (${ovs(inn.totalBalls)} ov)</div>
      </div>`;

    // Batting
    if(batEntries.length){
      h+=`<div class="msc-section"><div class="msc-section-hdr">Batting</div>`;
      batEntries.forEach(([name,d])=>{
        const sr=d.balls?((d.runs/d.balls)*100).toFixed(0):'—';
        h+=`<div class="msc-bat-row">
          <div style="flex:1;min-width:0">
            <div class="msc-bat-name">${name}</div>
            <div class="${d.out?'msc-bat-how':'msc-bat-notout'}">${d.out?dismDesc(d):'not out'}</div>
          </div>
          <div class="msc-bat-stats">
            <div class="msc-stat"><div class="msc-stat-val">${d.runs}</div><div class="msc-stat-lbl">R</div></div>
            <div class="msc-stat"><div class="msc-stat-val">${d.balls}</div><div class="msc-stat-lbl">B</div></div>
            <div class="msc-stat"><div class="msc-stat-val">${d.fours||0}</div><div class="msc-stat-lbl">4s</div></div>
            <div class="msc-stat"><div class="msc-stat-val">${d.sixes||0}</div><div class="msc-stat-lbl">6s</div></div>
            <div class="msc-stat"><div class="msc-stat-val">${sr}</div><div class="msc-stat-lbl">SR</div></div>
          </div>
        </div>`;
      });
      h+=`<div class="msc-extras">Extras: ${totalExtras} (Wd ${ex.wides||0}, Nb ${ex.noBalls||0}, B ${ex.byes||0}, Lb ${ex.legByes||0})</div>`;
      h+=`</div>`;
    }

    // Bowling
    if(bowlEntries.length){
      h+=`<div class="msc-section"><div class="msc-section-hdr">Bowling — ${oppName}</div>`;
      bowlEntries.forEach(([name,d])=>{
        const econ=d.balls?((d.runs/(d.balls/6))).toFixed(1):'—';
        h+=`<div class="msc-bowl-row">
          <div class="msc-bowl-name">${name}</div>
          <div class="msc-bowl-num">${ovs(d.balls)}<div style="font-size:9px;color:var(--ts)">Ov</div></div>
          <div class="msc-bowl-num">${d.runs}<div style="font-size:9px;color:var(--ts)">R</div></div>
          <div class="msc-bowl-num bold">${d.wickets}<div style="font-size:9px;color:var(--ts)">W</div></div>
          <div class="msc-bowl-num">${d.wides||0}<div style="font-size:9px;color:var(--ts)">Wd</div></div>
          <div class="msc-bowl-num">${econ}<div style="font-size:9px;color:var(--ts)">Eco</div></div>
        </div>`;
      });
      h+=`</div>`;
    }
    h+=`</div>`; // close msc-inn
  });

  h+=`<div class="msc-actions">
    <button class="act" style="border-color:var(--accent);color:var(--accent)" onclick="syncToSheets()">⟳ Sync to Sheets</button>
    <button class="act" onclick="confirmReset()">+ New Match</button>
    <button class="act d" onclick="deleteMatch()">🗑 Delete</button>
  </div>`;
  h+=`</div>`;
  return h;
}

function deleteMatch(){
  const ctx = M.finished ? 'This completed scorecard will be permanently deleted.'
            : M.active   ? 'The current live match will be deleted. All scoring data will be lost.'
            :               'This match setup will be deleted.';
  confirm2('Delete this match?', ctx, ()=>{
    M=blank();
    undoStack=[];
    save();render();
    toast('Match deleted','warn');
  });
}
function confirmReset(){
  confirm2('Reset this match?','Scores and balls will be cleared. Team names, rosters, toss and opening players will be kept.',()=>{
    const kept={
      // Identity
      battingTeam:  M.battingTeam,
      fieldingTeam: M.fieldingTeam,
      sheetName:    M.sheetName,
      matchType:    M.matchType,
      totalOvers:   M.totalOvers,
      // Toss
      tossWinner:   M.tossWinner,
      tossDecision: M.tossDecision,
      // Rosters
      battingSquad:  [...M.battingSquad],
      fieldingSquad: [...M.fieldingSquad],
      // Opening players & bowlers
      striker:    M.striker,
      nonStriker: M.nonStriker,
      bowler:     M.bowler,
      bowler2:    M.bowler2,
    };
    M={...blank(),...kept};
    undoStack=[];
    save();render();
    toast('Match reset — details preserved','success');
  });
}

/* ── SETUP ACTIONS ── */
function setToss(btn,dec){
  M.tossDecision=dec;
  save();render();
}
function setTossWinner(activeId,otherId,name){
  M.tossWinner=name;
  save();render();
}
function updateTossButtons(){
  // Update the toss winner team-name buttons and the toss decision buttons live.
  // Squad card labels are updated by render() when toss changes.
  const t1=M.battingTeam||'Our Team';
  const t2=M.fieldingTeam||'Opponents';
  const b1=document.getElementById('tw-t1');
  const b2=document.getElementById('tw-t2');
  if(b1){b1.textContent=t1;b1.classList.toggle('on',M.tossWinner===t1);}
  if(b2){b2.textContent=t2;b2.classList.toggle('on',M.tossWinner===t2);}
}
function upRoster(side,idx,val){
  // side is 'bat' or 'fld' — stable regardless of toss
  (side==='bat'?M.battingSquad:M.fieldingSquad)[idx]=val;save();
}
function startScoring(){
  const bat=document.getElementById('sc-bat')?.value?.trim();
  const opp=document.getElementById('sc-opp')?.value?.trim();
  const ov=+(document.getElementById('sc-ov')?.value)||20;
  const str=document.getElementById('sc-str')?.value?.trim();
  const ns=document.getElementById('sc-ns')?.value?.trim();
  const b1=document.getElementById('sc-b1')?.value?.trim();
  const b2=document.getElementById('sc-b2')?.value?.trim()||'';
  const tw=M.tossWinner||'';
  const mt=document.getElementById('sc-mt')?.value||'League';
  if(!bat||!opp||!str||!ns||!b1){toast('Fill in team names and opening players','warn');return;}
  Object.assign(M,{active:true,battingTeam:bat,fieldingTeam:opp,totalOvers:ov,matchType:mt,
    tossWinner:tw,tossDecision:M.tossDecision||'bat',
    runs:0,wickets:0,balls:0,totalBalls:0,extras:{wides:0,noBalls:0,byes:0,legByes:0},
    striker:str,nonStriker:ns,bowler:b1,bowler2:b2,
    prevBowler: b2 || "", // b2 bowls next; after that alternates
    batsmen:{},bowlers:{},ballLog:[],target:M.innings===1?null:M.target});
  M.sheetName=M.sheetName||`${bat} vs ${opp}`;
  snapshot();
  getBat(str);getBat(ns);getBowl(b1);save();render();
}

/* ── NEW MATCH → creates Sheets tab ── */
function confirmNewMatch(){
  if(!M.battingTeam&&!M.fieldingTeam&&!M.active){render();return;}
  confirm2('Start a New Match?',
    'Current match will sync to its own sheet tab in Google Sheets. A fresh match will begin.',
    doNewMatch);
}
function doNewMatch(){
  if(M.battingTeam||M.active){
    pushSheet(M,()=>{M=blank();save();render();toast('New match started — sheet tab created','success');},true);
  } else {M=blank();save();render();}
}

/* ── SUGGESTIONS ── */
function showS(inId,sugId,mode){
  // mode: 'bat'  = batting squad (setup + live)
  //       'bowl' = bowling squad (setup + live)
  //       true   = batting squad (live, excludes dismissed/active)
  //       false  = bowling squad (live, excludes current bowler)
  // M.battingSquad always holds the CURRENT batting team's players.
  // M.fieldingSquad always holds the CURRENT fielding team's players.
  // endInnings() swaps both when innings 2 begins, so they are always correct.
  const inp=document.getElementById(inId),box=document.getElementById(sugId);
  if(!inp||!box)return;
  const val=inp.value.toLowerCase();
  const isBat = (mode==='bat' || mode===true);
  const _sq=tossSquads();
  let pool = isBat ? _sq.battingSquad.filter(Boolean) : _sq.fieldingSquad.filter(Boolean);
  // Live scoring: exclude dismissed batsmen and players already at the crease
  if(mode===true && M.active){
    const out=Object.entries(M.batsmen).filter(([,d])=>d.out).map(([n])=>n);
    const active=[M.striker,M.nonStriker].filter(Boolean);
    pool=pool.filter(n=>!out.includes(n)&&!active.includes(n));
  }
  // Live scoring: exclude current bowler from suggestions
  if(mode===false && M.active){
    pool=pool.filter(n=>n!==M.bowler);
  }
  const f=val?pool.filter(n=>n.toLowerCase().includes(val)):pool;
  if(!f.length){box.style.display='none';return;}
  box.innerHTML=f.map(n=>`<div class="sugg" onmousedown="pickS('${inId}','${sugId}','${esc(n)}')">${n}</div>`).join('');
  box.style.display='block';
}
function hideS(id){setTimeout(()=>{const e=document.getElementById(id);if(e)e.style.display='none';},200);}
function pickS(inId,sugId,n){const inp=document.getElementById(inId),box=document.getElementById(sugId);if(inp)inp.value=n;if(box)box.style.display='none';}

/* ── GOOGLE SHEETS ──
   pushSheet sends a payload with:
     newSheet: bool — if true, Apps Script should create a new sheet tab named sheetName
     sheetName: string — the tab name
     data: array of row objects

   Apps Script example to handle newSheet:
   function doPost(e) {
     const p = JSON.parse(e.postData.contents);
     const ss = SpreadsheetApp.getActiveSpreadsheet();
     let sh = ss.getSheetByName(p.sheetName);
     if (!sh || p.newSheet) { sh = ss.insertSheet(p.sheetName); }
     // write p.data rows to sh...
     return ContentService.createTextOutput(JSON.stringify({ok:true})).setMimeType(ContentService.MimeType.JSON);
   }
*/
let syncSt='idle';
function pushSheet(m,cb,newSheet=false){
  if(!SYNC_URL){if(cb)cb();return;}
  const sn=m.sheetName||(m.battingTeam&&m.fieldingTeam?`${m.battingTeam} vs ${m.fieldingTeam}`:'Match '+new Date().toLocaleDateString('en-GB'));
  const header=[{type:'header',battingTeam:m.battingTeam,fieldingTeam:m.fieldingTeam,matchType:m.matchType,overs:m.totalOvers,
    score:`${m.runs}/${m.wickets}`,totalOvers:ovs(m.totalBalls),tossWinner:m.tossWinner,tossDecision:m.tossDecision,
    extras:`Wd:${m.extras.wides} Nb:${m.extras.noBalls} By:${m.extras.byes} Lb:${m.extras.legByes}`,innings:m.innings}];
  const batRows=Object.entries(m.batsmen).map(([n,d])=>({type:'bat',name:n,runs:d.runs,balls:d.balls,fours:d.fours,sixes:d.sixes,sr:d.balls?((d.runs/d.balls)*100).toFixed(1):0,out:d.out?'Yes':'Not out'}));
  const bowlRows=Object.entries(m.bowlers).map(([n,d])=>({type:'bowl',name:n,overs:ovs(d.balls),runs:d.runs,wickets:d.wickets,wides:d.wides,noBalls:d.noBalls}));
  const body=JSON.stringify({newSheet,sheetName:sn,data:[...header,...batRows,...bowlRows]});
  fetch(SYNC_URL,{method:'POST',headers:{'Content-Type':'text/plain'},body})
    .then(r=>r.json()).then(()=>{if(cb)cb();})
    .catch(()=>fetch(SYNC_URL,{method:'POST',mode:'no-cors',headers:{'Content-Type':'text/plain'},body})
      .then(()=>{if(cb)cb();}).catch(()=>{if(cb)cb();toast('Sync warning — check sheet','warn');}));
}
function syncToSheets(){
  if(!SYNC_URL){toast('No sync URL set','warn');return;}
  if(syncSt==='syncing')return;
  syncSt='syncing';updSync();
  pushSheet(M,()=>{syncSt='success';updSync();toast('✓ Synced to Google Sheets','success');setTimeout(()=>{syncSt='idle';updSync();},3000);},false);
}
function updSync(){const b=document.getElementById('sync-btn');if(!b)return;b.textContent={idle:'⟳ Sync',syncing:'…',success:'✓',error:'✕'}[syncSt]||'⟳';b.disabled=syncSt==='syncing';}

/* ── UTILS ── */
function toast(msg,type){
  const t=document.getElementById('toast');
  const s={success:'background:#238636;color:#fff;border:1px solid #2ea043',warn:'background:#9e6a03;color:#fff;border:1px solid #e3b341',error:'background:#8e1519;color:#fff;border:1px solid #f85149'};
  t.style.cssText=`position:fixed;bottom:18px;left:50%;transform:translateX(-50%);padding:7px 14px;border-radius:6px;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:600;z-index:9999;transition:opacity .3s;white-space:nowrap;pointer-events:none;box-shadow:0 4px 12px rgba(0,0,0,.4);${s[type]||s.warn}`;
  t.textContent=msg;t.style.opacity='1';clearTimeout(t._t);t._t=setTimeout(()=>{t.style.opacity='0';},2800);
}
let _cb=null;
function confirm2(title,text,cb){
  _cb=cb;
  document.body.insertAdjacentHTML('beforeend',`
    <div class="mo mo-centre" id="cm" onclick="if(event.target===this)dc()">
      <div class="modal"><h3>${title}</h3><p>${text}</p>
        <div class="ma"><button class="mbtn c" onclick="dc()">Cancel</button><button class="mbtn ok" onclick="dcc()">Confirm</button></div>
      </div>
    </div>`);
}
function dc(){document.getElementById('cm')?.remove();_cb=null;}
function dcc(){dc();if(_cb)_cb();}

load();render();
</script>
